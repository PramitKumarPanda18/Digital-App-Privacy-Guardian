<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Guardian Web</title>
    
    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 2. Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 3. Chart.js plugin for showing labels/percentages -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    
    <!-- 4. Link to your external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="py-10 px-4">

    <!-- Narrower max-width for "list" feel -->
    <div class="guardian-container max-w-2xl mx-auto rounded-xl overflow-hidden">
        
        <!-- 1. Header -->
        <header class="p-8 text-center" style="background-color: var(--color-primary-dark);">
            <h1 class="text-3xl font-bold text-white">Smart App Privacy Guardian</h1>
            <p class="text-base text-purple-200">A simulation of modern privacy risks</p>
        </header>

        <!-- 2. Mode Selection -->
        <section id="mode-selection" class="p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Select Privacy Mode:</h2>
            <!-- Vertical list -->
            <div id="mode-list" class="grid grid-cols-1 gap-3">
                <button class="btn btn-primary-light mode-btn" data-mode="1">1. Strict</button>
                <button class="btn btn-primary-light mode-btn" data-mode="2">2. Balanced</button>
                <button class="btn btn-primary-light mode-btn" data-mode="3">3. Open</button>
            </div>
        </section>

        <!-- 3. App Selection -->
        <section id="app-selection" class="p-6 border-t border-gray-100 hidden">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Select App to Open:</h2>
            <!-- Vertical list -->
            <div id="app-list" class="grid grid-cols-1 gap-3">
                <!-- App buttons will be generated by JS -->
            </div>
        </section>

        <!-- 4. Analysis Screen -->
        <section id="analysis-screen" class="p-6 border-t border-gray-100 hidden">
            <h2 id="analysis-title" class="text-2xl font-semibold mb-4" style="color: var(--color-primary);"></h2>
            
            <!-- Permission Prompt -->
            <div id="permission-prompt" class="border border-gray-200 rounded-lg p-5 mb-6 shadow-sm hidden">
                <div class="prompt-info mb-4">
                    <p class="text-lg">App requests: <strong id="perm-name" class="font-mono p-1 rounded bg-gray-100"></strong></p>
                    <p id="perm-required" class="text-gray-600 mt-1"></p>
                    <p class="mt-2">Advice: <strong id="perm-advice" class="italic text-gray-800"></strong></p>
                </div>
                <div class="flex gap-4">
                    <!-- Icons removed -->
                    <button id="btn-allow" class="btn btn-success flex-1">
                        Allow
                    </button>
                    <button id="btn-deny" class="btn btn-danger flex-1">
                        Deny
                    </button>
                </div>
            </div>

            <!-- This is the bug-fixed report area -->
            <div id="report-area">
                <!-- This div holds all the text/HTML reports -->
                <div id="dynamic-report-content">
                    <!-- Report will be generated by JS here -->
                </div>
                
                <!-- This div holds the chart and is NEVER cleared -->
                <div class="chart-container mt-6">
                    <canvas id="riskChart"></canvas>
                </div>
            </div>

            <button id="btn-back-to-apps" class="btn btn-primary w-full mt-6 hidden">Back to App List</button>
        </section>

    </div>

    <!-- 
        *** BUG FIX ***
        Changed to a standard script tag with 'defer'.
        This fixes the "not responding" issue.
    -->
    <script src="script.js" defer></script>
</body>
</html>
